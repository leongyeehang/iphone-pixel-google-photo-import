name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats libimage-exiftool-perl

      - name: ShellCheck
        run: shellcheck *.sh

      - name: Run tests
        run: bats test
